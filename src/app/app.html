<div class="intro-overlay" [class.fade-out]="!isIntroVisible()">
  <div class="text-center">
    <h1 class="intro-text">
      MOVE<span class="brand-colon">:</span>{{ introSuffix() }}
    </h1>
    <h2 class="text-white-50 mx-auto mt-2 mb-5">Driven by Intelligence.</h2>
  </div>
</div>

<div class="app-shell" *ngIf="isAppReady()">
  <nav
    id="mainNav"
    class="navbar navbar-expand-lg navbar-light fixed-top"
    [class.navbar-home]="isHome()"
    [class.navbar-login]="isLogin() || isProfil()"
    [class.navbar-inner]="!isHome() && !isLogin() && !isProfil()"
    [class.navbar-shrink]="isNavbarShrunk() && isHome()"
  >
    <div class="container px-4 px-lg-5">
      <a class="navbar-brand" routerLink="/">
        <img src="assets/img/logo.svg" alt="CPS-Projekt Logo" class="navbar-logo" />
      </a>

      <button
        class="navbar-toggler navbar-toggler-right"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarResponsive"
        aria-controls="navbarResponsive"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        Menu
        <i class="fas fa-bars"></i>
      </button>

      <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="#about" [class.active]="activeSection() === 'about'">Über uns</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#projects" [class.active]="activeSection() === 'projects'">CPS-Projekte</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#signup" [class.active]="activeSection() === 'signup'">Kontakt</a>
          </li>

          @if (!authService.isLoggedIn()) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/login">Intranet</a>
            </li>
          } @else if (authService.userRole() === 'mitarbeiter') {
            <li class="nav-item">
              <a class="nav-link" routerLink="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/kanban">Kanban</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/profil" title="Profil">
                <i class="fas fa-user"></i>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" (click)="onLogoutClick()" style="cursor: pointer" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
              </a>
            </li>
          }
        </ul>
      </div>
    </div>
  </nav>

  <main
    [class.main-home]="isHome()"
    [class.main-login]="isLogin() || isProfil()"
    [class.main-inner]="!isHome() && !isLogin() && !isProfil()"
  >
    <router-outlet></router-outlet>
  </main>

  <footer *ngIf="!isLogin() && !isProfil()" class="footer bg-black small text-center text-white-50">
    <div class="container px-4 px-lg-5">Copyright &copy; CPS-Projekt Manager 2026</div>
  </footer>
</div>
